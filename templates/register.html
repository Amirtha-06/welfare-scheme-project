{% extends "base.html" %}
{% block title %}Register — Welfare Intelligence{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px; margin-top: 3rem; margin-bottom: 5rem;">

  <div class="text-center mb-4">
    <div class="section-label">Get Started</div>
    <h2 style="font-family:'Syne',sans-serif; font-weight:800; font-size:1.75rem;">Create Your Account</h2>
    <p style="color:var(--muted); font-size:0.88rem; margin-top:0.4rem;">Join thousands of citizens discovering their entitled benefits</p>
  </div>

  <div class="wcard p-4">
    <form method="POST" action="/register">

      <div class="mb-3">
        <label class="form-label"><i class="bi bi-person me-1"></i>Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. Ramesh Kumar" required>
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="bi bi-envelope me-1"></i>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
      </div>

      <button type="submit" class="btn-wl-primary w-100 justify-content-center" style="font-size:0.95rem;">
        <i class="bi bi-rocket-takeoff"></i> Create Account
      </button>

    </form>
  </div>

  <p class="text-center mt-3" style="color:var(--muted); font-size:0.85rem;">
    Already have an account? <a href="/login">Sign in</a>
  </p>

</div>
{% endblock %}
