{% extends "base.html" %}
{% block title %}Sign In — Welfare Intelligence{% endblock %}

{% block content %}
<div class="container" style="max-width: 460px; margin-top: 3rem; margin-bottom: 5rem;">

  <div class="text-center mb-4">
    <div class="section-label">Welcome Back</div>
    <h2 style="font-family:'Syne',sans-serif; font-weight:800; font-size:1.75rem;">Sign In to Your Account</h2>
    <p style="color:var(--muted); font-size:0.88rem; margin-top:0.4rem;">Access your personalised scheme recommendations</p>
  </div>

  <div class="wcard p-4">
    <form method="POST" action="/login">

      <div class="mb-3">
        <label class="form-label"><i class="bi bi-envelope me-1"></i>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Your password" required>
      </div>

      <button type="submit" class="btn-wl-primary w-100 justify-content-center" style="font-size:0.95rem;">
        <i class="bi bi-arrow-right-circle"></i> Sign In
      </button>

    </form>
  </div>

  <p class="text-center mt-3" style="color:var(--muted); font-size:0.85rem;">
    New here? <a href="/register">Create an account</a>
  </p>

</div>
{% endblock %}
