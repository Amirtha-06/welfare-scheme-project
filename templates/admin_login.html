{% extends "base.html" %}
{% block title %}Admin Login — Welfare Intelligence{% endblock %}

{% block content %}
<div class="container" style="max-width: 460px; margin-top: 3rem; margin-bottom: 5rem;">

    <div class="text-center mb-4">
        <div class="section-label">Restricted Access</div>
        <h2 style="font-family:'Syne',sans-serif; font-weight:800; font-size:1.75rem;">Admin Portal</h2>
        <p style="color:var(--muted); font-size:0.88rem; margin-top:0.4rem;">Authorised personnel only</p>
    </div>

    <div class="wcard p-4" style="border-color: rgba(245,158,11,0.3);">
        <div class="d-flex align-items-center gap-2 mb-4 p-3"
            style="background:rgba(245,158,11,0.08);border-radius:8px;border:1px solid rgba(245,158,11,0.2);">
            <i class="bi bi-shield-lock-fill" style="color:var(--warn);font-size:1.1rem;"></i>
            <span style="font-size:0.82rem; color:var(--warn);">This area is restricted to system administrators.</span>
        </div>

        <form method="POST" action="/admin/login">

            <div class="mb-3">
                <label class="form-label"><i class="bi bi-envelope me-1"></i>Admin Email</label>
                <input type="email" name="email" class="form-control" placeholder="admin@example.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Admin password" required>
            </div>

            <button type="submit" class="w-100 justify-content-center"
                style="background:rgba(245,158,11,0.15);border:1px solid var(--warn);color:var(--warn);font-weight:600;border-radius:8px;padding:0.6rem 1.4rem;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;cursor:pointer;transition:all 0.2s;">
                <i class="bi bi-shield-lock"></i> Login as Administrator
            </button>

        </form>
    </div>

    <p class="text-center mt-3" style="color:var(--muted); font-size:0.85rem;">
        Regular user? <a href="/login">Sign in here</a>
    </p>

</div>
{% endblock %}
